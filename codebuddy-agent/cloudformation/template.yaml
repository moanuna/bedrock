AWSTemplateFormatVersion: "2010-09-09"
Description: "CodeBuddy - AI GitHub PR 자동 리뷰 시스템 (Amazon Bedrock Agent)"

Parameters:
  AgentIdParam:
    Type: String
  AliasIdParam:
    Type: String
  GitHubTokenParam:
    Type: String
    NoEcho: true
  GitHubSecretParam:
    Type: String
    NoEcho: true
    Default: "codebuddy-secret"
  SlackWebhookUrlParam:
    Type: String
    NoEcho: true

Resources:
  # ─── IAM Role ────────────────────────────────────────────────────────
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: codebuddy-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      Policies:
        - PolicyName: BedrockAgentPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [bedrock:InvokeAgent, bedrock:InvokeModel, logs:*]
                Resource: "*"

  # ─── Orchestrator Lambda ────────────────────────────────────────────
  OrchestratorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: codebuddy-orchestrator
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 300
      MemorySize: 1024
      Environment:
        Variables:
          AGENT_ID: !Ref AgentIdParam
          ALIAS_ID: !Ref AliasIdParam
          GITHUB_TOKEN: !Ref GitHubTokenParam
          GITHUB_SECRET: !Ref GitHubSecretParam
          SLACK_WEBHOOK_URL: !Ref SlackWebhookUrlParam
      Code:
        ZipFile: |
          import json
          import os
          import hmac
          import hashlib
          import boto3
          import urllib.request

          AGENT_ID = os.environ.get('AGENT_ID', '')
          ALIAS_ID = os.environ.get('ALIAS_ID', '')
          GITHUB_SECRET = os.environ.get('GITHUB_SECRET', '')
          SLACK_WEBHOOK_URL = os.environ.get('SLACK_WEBHOOK_URL', '')

          bedrock_agent = boto3.client('bedrock-agent-runtime', region_name='ap-northeast-2')

          def verify_github_signature(payload_body: bytes, signature: str) -> bool:
              if not GITHUB_SECRET: return True
              expected = 'sha256=' + hmac.new(GITHUB_SECRET.encode(), payload_body, hashlib.sha256).hexdigest()
              return hmac.compare_digest(expected, signature)

          def send_slack_notification(pr_url: str, status: str, summary: str):
              if not SLACK_WEBHOOK_URL: return
              emoji = "✅" if status == "success" else "❌"
              message = {"text": f"{emoji} *CodeBuddy 리뷰 완료*\nPR: {pr_url}\n상태: {status}\n요약: {summary[:200]}..."}
              
              req = urllib.request.Request(
                  SLACK_WEBHOOK_URL, 
                  data=json.dumps(message).encode('utf-8'), 
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              try:
                  urllib.request.urlopen(req, timeout=5)
              except Exception as e:
                  print(f"Slack 전송 에러: {e}")

          def handler(event, context):
              headers = {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'}
              
              try:
                  if event.get('httpMethod') == 'OPTIONS': return {'statusCode': 200, 'headers': headers, 'body': ''}
                  
                  raw_body_str = event.get('body', '{}') or '{}'
                  raw_body_bytes = raw_body_str.encode('utf-8')
                  body = json.loads(raw_body_str)
                  
                  signature = event.get('headers', {}).get('X-Hub-Signature-256', '')
                  if signature and not verify_github_signature(raw_body_bytes, signature):
                      return {'statusCode': 401, 'body': json.dumps({'error': 'Invalid signature'})}
                  
                  pr_url = body.get('pr_url') or body.get('pull_request', {}).get('html_url')
                  if not pr_url:
                      return {'statusCode': 200, 'body': json.dumps({'message': 'PR ignored or missing'})}
                  
                  session_id = f"webhook-{pr_url.split('/')[-1]}"
                  
                  prompt = f"다음 GitHub PR을 분석해주세요: {pr_url}\n1. 코드 가져오기\n2. 복잡도 분석\n3. 테스트 코드 제안\n4. 리팩토링 제안\n5. PR 리뷰 댓글 등록"
                  
                  response = bedrock_agent.invoke_agent(
                      agentId=AGENT_ID, agentAliasId=ALIAS_ID, sessionId=session_id, inputText=prompt
                  )
                  
                  result = ''.join([event['chunk']['bytes'].decode('utf-8') for event in response['completion'] if 'chunk' in event])
                  
                  send_slack_notification(pr_url, "success", result)
                  
                  return {'statusCode': 200, 'headers': headers, 'body': json.dumps({'message': 'Success', 'pr_url': pr_url})}
                  
              except Exception as e:
                  print(e)
                  return {'statusCode': 500, 'headers': headers, 'body': json.dumps({'error': str(e)})}

  # ─── API Gateway ────────────────────────────────────────────────────
  CodeBuddyApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: CodeBuddyAPI

  ReviewResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref CodeBuddyApi
      ParentId: !GetAtt CodeBuddyApi.RootResourceId
      PathPart: review

  ReviewMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref CodeBuddyApi
      ResourceId: !Ref ReviewResource
      HttpMethod: POST
      AuthorizationType: NONE
      ApiKeyRequired: false
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${OrchestratorLambda.Arn}/invocations"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ReviewMethod
    Properties:
      RestApiId: !Ref CodeBuddyApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref CodeBuddyApi
      DeploymentId: !Ref ApiDeployment
      StageName: prod

  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    Properties:
      Name: CodeBuddyApiKey
      Enabled: true

  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    Properties:
      UsagePlanName: CodeBuddyUsagePlan
      ApiStages:
        - ApiId: !Ref CodeBuddyApi
          Stage: !Ref ApiStage
      Throttle:
        BurstLimit: 10
        RateLimit: 5

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt OrchestratorLambda.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${CodeBuddyApi}/*/POST/review"

Outputs:
  ApiGatewayUrl:
    Value: !Sub "https://${CodeBuddyApi}.execute-api.${AWS::Region}.amazonaws.com/prod/review"
